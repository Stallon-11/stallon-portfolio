name: CI/CD Portfolio Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  test-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest reflex
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Pytest Suite
        run: |
          pytest

  deploy-to-cloud:
    needs: test-code
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Deploy to Reflex Cloud
        run: |
          reflex deploy --project ${{ secrets.REFLEX_PROJECT_ID }} --app-id c9488366-4e58-4d19-a0e5-522452cc846e --token ${{ secrets.REFLEX_TOKEN }} --no-interactive